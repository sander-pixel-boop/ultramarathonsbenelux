name: Weekly Scrapers

on:
  schedule:
    - cron: '0 2 * * 1' # Every Monday at 02:00 UTC
  workflow_dispatch:

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scraper: [ahotu, duv, finishers, hardloopkalender, trail_running, ultraned, ultraracecalendar]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Scraper
        run: node scripts/scrapers/${{ matrix.scraper }}.js

      - name: Upload Raw Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-data-${{ matrix.scraper }}
          path: data/raw/${{ matrix.scraper }}.json
          retention-days: 1

  merge-data:
    needs: run-scrapers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Download Raw Data Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: raw-data-*
          path: data/raw
          merge-multiple: true

      - name: Run Merge Script
        run: node scripts/merge_races.js

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/races.json data/audit_log.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated weekly scrape update"
            ./push.sh
          fi
